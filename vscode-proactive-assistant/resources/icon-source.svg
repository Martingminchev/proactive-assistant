<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <!-- Proactive AI Assistant - Main Extension Icon (256x256) -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161B22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="robotGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#58A6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1F6FEB;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background Rounded Square -->
  <rect x="8" y="8" width="240" height="240" rx="48" fill="url(#bgGradient)"/>
  
  <!-- Decorative circuit pattern -->
  <g opacity="0.1" stroke="#58A6FF" stroke-width="2" fill="none">
    <path d="M40 128 H80 M176 128 H216"/>
    <path d="M128 40 V80 M128 176 V216"/>
    <circle cx="40" cy="128" r="6"/>
    <circle cx="216" cy="128" r="6"/>
    <circle cx="128" cy="40" r="6"/>
    <circle cx="128" cy="216" r="6"/>
    <rect x="100" y="100" width="56" height="56" rx="8"/>
  </g>
  
  <!-- Robot Body -->
  <g filter="url(#softShadow)">
    <!-- Head -->
    <rect x="88" y="56" width="80" height="56" rx="16" fill="url(#robotGradient)"/>
    
    <!-- Eyes Container -->
    <g fill="#FFFFFF">
      <!-- Left Eye -->
      <circle cx="112" cy="84" r="14"/>
      <!-- Right Eye -->
      <circle cx="144" cy="84" r="14"/>
    </g>
    
    <!-- Pupils -->
    <g fill="#0D1117">
      <circle cx="112" cy="84" r="6"/>
      <circle cx="144" cy="84" r="6"/>
    </g>
    
    <!-- Body -->
    <rect x="72" y="120" width="112" height="80" rx="20" fill="url(#robotGradient)"/>
    
    <!-- Chest Display -->
    <rect x="96" y="140" width="64" height="40" rx="8" fill="#0D1117" opacity="0.3"/>
    
    <!-- Activity LEDs -->
    <g fill="#3FB950">
      <circle cx="108" cy="160" r="4"/>
      <circle cx="128" cy="160" r="4"/>
      <circle cx="148" cy="160" r="4"/>
    </g>
    
    <!-- Antenna -->
    <line x1="128" y1="56" x2="128" y2="40" stroke="#58A6FF" stroke-width="4" stroke-linecap="round"/>
    <circle cx="128" cy="36" r="8" fill="#F85149" filter="url(#glow)"/>
  </g>
  
  <!-- Status Ring -->
  <circle cx="128" cy="128" r="100" stroke="#58A6FF" stroke-width="4" fill="none" opacity="0.3" stroke-dasharray="8 8"/>
</svg>