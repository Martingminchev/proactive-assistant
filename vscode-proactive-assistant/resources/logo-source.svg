<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Proactive AI Assistant - Logo (128x128) -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#58A6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1F6FEB;stop-opacity:1" />
    </linearGradient>
    <filter id="logoShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect x="4" y="4" width="120" height="120" rx="24" fill="#0D1117"/>
  
  <!-- Robot -->
  <g filter="url(#logoShadow)">
    <!-- Head -->
    <rect x="44" y="28" width="40" height="28" rx="8" fill="url(#logoGradient)"/>
    
    <!-- Eyes -->
    <g fill="#FFFFFF">
      <circle cx="56" cy="42" r="7"/>
      <circle cx="72" cy="42" r="7"/>
    </g>
    
    <!-- Pupils -->
    <g fill="#0D1117">
      <circle cx="56" cy="42" r="3"/>
      <circle cx="72" cy="42" r="3"/>
    </g>
    
    <!-- Body -->
    <rect x="36" y="60" width="56" height="40" rx="10" fill="url(#logoGradient)"/>
    
    <!-- Chest Detail -->
    <rect x="48" y="72" width="32" height="16" rx="4" fill="#0D1117" opacity="0.3"/>
    
    <!-- LEDs -->
    <g fill="#3FB950">
      <circle cx="54" cy="80" r="2"/>
      <circle cx="64" cy="80" r="2"/>
      <circle cx="74" cy="80" r="2"/>
    </g>
    
    <!-- Antenna -->
    <line x1="64" y1="28" x2="64" y2="20" stroke="#58A6FF" stroke-width="3" stroke-linecap="round"/>
    <circle cx="64" cy="18" r="4" fill="#F85149"/>
  </g>
</svg>