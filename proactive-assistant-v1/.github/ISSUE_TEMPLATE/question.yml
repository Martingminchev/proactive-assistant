name: ❓ Question / Support
description: Ask a question or get help with the extension
title: '[QUESTION] '
labels: ['question', 'support']
body:
  - type: markdown
    attributes:
      value: |
        Have a question about using the Proactive AI Assistant? We're here to help!

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know?
      placeholder: Describe your question here...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Provide any relevant context that might help us answer your question
      placeholder: What are you trying to accomplish? What have you tried so far?

  - type: input
    id: vscode_version
    attributes:
      label: VS Code Version
      placeholder: e.g., 1.85.0

  - type: input
    id: extension_version
    attributes:
      label: Extension Version
      placeholder: e.g., 0.1.0

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have read the documentation
          required: false
        - label: I have searched existing issues for similar questions
          required: true
