name: 🐛 Bug Report
description: Report a bug to help us improve the extension
title: '[BUG] '
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below to help us investigate.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: Describe the bug here...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
      placeholder: Describe what you expected to happen...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
      placeholder: Describe what actually happened...
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ## Environment Information

  - type: input
    id: vscode_version
    attributes:
      label: VS Code Version
      description: Find this in Help > About
      placeholder: e.g., 1.85.0
    validations:
      required: true

  - type: input
    id: extension_version
    attributes:
      label: Extension Version
      description: Find this in the Extensions view
      placeholder: e.g., 0.1.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: OS Version
      description: e.g., Windows 11, macOS 14.2, Ubuntu 22.04
      placeholder: e.g., Windows 11 23H2
    validations:
      required: true

  - type: input
    id: pieces_version
    attributes:
      label: Pieces OS Version
      description: If applicable, the version of Pieces OS you're using
      placeholder: e.g., 2.1.0

  - type: textarea
    id: logs
    attributes:
      label: Extension Logs
      description: |
        Please provide relevant log output. You can view logs by:
        1. Opening the Output panel (View > Output)
        2. Selecting "Proactive AI Assistant" from the dropdown
        3. Copying any error messages
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: I have provided all the information requested above
          required: true
        - label: I can reproduce this issue consistently
          required: false
