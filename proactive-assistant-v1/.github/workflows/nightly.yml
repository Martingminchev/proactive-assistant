name: Nightly Build

on:
  schedule:
    # Run daily at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  test-insiders:
    name: Test with VS Code Insiders
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        working-directory: ./vscode-proactive-assistant
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./vscode-proactive-assistant/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Run tests with VS Code Insiders (Linux)
        if: runner.os == 'Linux'
        run: |
          export CODE_VERSION=insiders
          xvfb-run -a npm test
        env:
          DISPLAY: ':99.0'

      - name: Run tests with VS Code Insiders (Windows/macOS)
        if: runner.os != 'Linux'
        run: |
          export CODE_VERSION=insiders
          npm test
        shell: bash

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-insiders
          path: vscode-proactive-assistant/test-results/
          retention-days: 7

  compatibility-report:
    name: Generate Compatibility Report
    needs: test-insiders
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*-insiders
          merge-multiple: true

      - name: Create compatibility report
        run: |
          echo "# VS Code Insiders Compatibility Report" > compatibility-report.md
          echo "" >> compatibility-report.md
          echo "Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> compatibility-report.md
          echo "" >> compatibility-report.md
          echo "## Summary" >> compatibility-report.md
          echo "" >> compatibility-report.md
          
          if [ "${{ needs.test-insiders.result }}" == "success" ]; then
            echo "✅ All tests passed with VS Code Insiders" >> compatibility-report.md
          else
            echo "⚠️ Some tests failed with VS Code Insiders" >> compatibility-report.md
          fi
          
          echo "" >> compatibility-report.md
          echo "## Details" >> compatibility-report.md
          echo "" >> compatibility-report.md
          echo "See the workflow run for detailed test results." >> compatibility-report.md
        shell: bash

      - name: Upload compatibility report
        uses: actions/upload-artifact@v4
        with:
          name: compatibility-report
          path: compatibility-report.md
          retention-days: 30

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `⚠️ Nightly Build Failed - ${new Date().toISOString().split('T')[0]}`;
            const body = `## Nightly Build Failure

            The nightly build with VS Code Insiders has failed.

            ### Details
            - Workflow: ${{ github.workflow }}
            - Run: ${{ github.run_id }}
            - Commit: ${{ github.sha }}

            ### Next Steps
            1. Check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            2. Investigate compatibility issues with the latest VS Code Insiders
            3. Update the extension if necessary

            cc: @${{ github.repository_owner }}`;

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['bug', 'nightly-failure', 'vs-code-insiders']
            });
