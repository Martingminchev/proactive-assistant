# Standardized labels for the Proactive AI Assistant project
# You can apply these labels using the GitHub CLI or a labels workflow

# Type labels
- name: bug
  color: d73a4a
  description: Something isn't working

- name: enhancement
  color: a2eeef
  description: New feature or request

- name: documentation
  color: 0075ca
  description: Improvements or additions to documentation

- name: question
  color: d876e3
  description: Further information is requested

# Priority labels
- name: priority-critical
  color: b60205
  description: Critical priority - blocks releases

- name: priority-high
  color: d93f0b
  description: High priority

- name: priority-medium
  color: fbca04
  description: Medium priority

- name: priority-low
  color: 0e8a16
  description: Low priority

# Status labels
- name: triage
  color: f9d0c4
  description: Needs triage

- name: in-progress
  color: cccccc
  description: Currently being worked on

- name: needs-review
  color: fef2c0
  description: Needs code review

- name: blocked
  color: e99695
  description: Blocked by another issue or external factor

- name: wontfix
  color: ffffff
  description: This won't be worked on

# Area labels
- name: area-ui
  color: 84b6eb
  description: Related to user interface

- name: area-core
  color: 5319e7
  description: Related to core extension logic

- name: area-pieces-integration
  color: 006b75
  description: Related to Pieces OS integration

- name: area-settings
  color: c2e0c6
  description: Related to extension settings

- name: area-performance
  color: f9d0c4
  description: Related to performance improvements

- name: area-testing
  color: d4c5f9
  description: Related to tests

# Special labels
- name: good-first-issue
  color: 7057ff
  description: Good for newcomers

- name: help-wanted
  color: 008672
  description: Extra attention is needed

- name: dependencies
  color: 0366d6
  description: Pull requests that update a dependency file

- name: security
  color: ee0701
  description: Security-related issue

- name: breaking-change
  color: b60205
  description: Introduces a breaking change

- name: automated
  color: 000000
  description: Created by automation

- name: nightly-failure
  color: d73a4a
  description: Nightly build failure

- name: vs-code-insiders
  color: 1d76db
  description: Related to VS Code Insiders compatibility

