# Electron Builder Configuration
# https://www.electron.build/configuration/configuration

appId: com.proactive-assistant.app
productName: Proactive Assistant
copyright: Copyright © 2024 Proactive Assistant Team

directories:
  output: dist
  buildResources: assets

files:
  - main.js
  - preload.js
  - TrayManager.js
  - WindowManager.js
  - assets/**/*
  - '!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}'
  - '!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}'
  - '!**/node_modules/*.d.ts'
  - '!**/node_modules/.bin'
  - '!**/*.{iml,o,hprof,orig,pyc,pyo,rbc,swp,csproj,sln,xproj}'
  - '!.editorconfig'
  - '!**/._*'
  - '!**/{.DS_Store,.git,.hg,.svn,CVS,RCS,SCCS,.gitignore,.gitattributes}'
  - '!**/{__pycache__,thumbs.db,.flowconfig,.idea,.vs,.nyc_output}'
  - '!**/{appveyor.yml,.travis.yml,circle.yml}'
  - '!**/{npm-debug.log,yarn.lock,.yarn-integrity,.yarn-metadata.json}'

extraResources:
  - from: ../client/dist
    to: client
    filter:
      - '**/*'

asar: true
asarUnpack:
  - '**/*.node'
  - '**/node_modules/sharp/**/*'

# macOS Configuration
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  icon: assets/icons/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist
  darkModeSupport: true

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380

# Windows Configuration
win:
  target:
    - target: nsis
      arch:
        - x64
        - ia32
    - target: portable
      arch:
        - x64
  icon: assets/icons/icon.ico
  publisherName: Proactive Assistant Team
  verifyUpdateCodeSignature: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Proactive Assistant
  uninstallDisplayName: Proactive Assistant
  license: ../LICENSE
  artifactName: ${name}-${version}-setup.${ext}

portable:
  artifactName: ${name}-${version}-portable.${ext}

# Linux Configuration
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: rpm
      arch:
        - x64
  icon: assets/icons
  category: Office
  maintainer: Proactive Assistant Team
  vendor: Proactive Assistant Team
  synopsis: AI-powered proactive assistant
  description: A system tray application for the Proactive AI Assistant
  mimeTypes:
    - x-scheme-handler/proactive-assistant

appImage:
  artifactName: ${name}-${version}.${ext}

deb:
  artifactName: ${name}-${version}.${ext}
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0
    - libuuid1
    - libsecret-1-0

rpm:
  artifactName: ${name}-${version}.${ext}
